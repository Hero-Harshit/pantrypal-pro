<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth - PantryPal Pro</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body data-page="auth">

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">🍽️</div> PantryPal Pro
      </a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-container glass-card fade-up">
      <div class="text-center mb-8">
        <h2>Welcome to PantryPal</h2>
        <p class="text-muted">Start cooking smarter today</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="loginTab">Login</div>
        <div class="auth-tab" id="signupTab">Sign Up</div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <div class="flex justify-between">
            <label for="loginPass">Password</label>
            <a href="#" class="text-muted" style="font-size: 0.8rem;">Forgot password?</a>
          </div>
          <input type="password" id="loginPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full mt-8">Log In</button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signupPass">Password</label>
          <input type="password" id="signupPass" placeholder="At least 6 characters" required>
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full mt-8">Create Account</button>
      </form>

      <!-- Supabase Auth Providers Placeholder -->
      <div class="supabase-placeholder mt-8">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
          <hr style="flex:1; border:none; border-top: 1px solid var(--border);">
          <small class="text-muted">or continue with</small>
          <hr style="flex:1; border:none; border-top: 1px solid var(--border);">
        </div>

        <div class="flex flex-col gap-4">
          <!-- TODO: Integrate Supabase Auth here -->
          <button class="btn btn-outline btn-full" onclick="showToast('Supabase Google Auth Placeholder')">
            <span style="font-size: 1.2rem; margin-right: 0.5rem;">G</span> Google
          </button>
          <button class="btn btn-outline btn-full" onclick="showToast('Supabase GitHub Auth Placeholder')">
            <span style="font-size: 1.2rem; margin-right: 0.5rem;">🐙</span> GitHub
          </button>
        </div>
      </div>

      <p class="text-center mt-8 text-muted" style="font-size: 0.75rem;">
        By continuing, you agree to our Terms of Service and Privacy Policy.<br>
        <!-- Supabase Client init goes in js/app.js later -->
      </p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
