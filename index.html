<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="1.8; url=src/html/landing.html">
  <title>PantryPal Pro — Preparing Your Kitchen</title>
  <link rel="icon" type="image/png" href="src/assets/Logo.png">
  <style>
    :root {
      --primary: #00e676;
      --bg: #0f172a;
      --text: #f8fafc;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .splash-container {
      position: relative;
      text-align: center;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.3));
      animation: float 3s ease-in-out infinite;
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid var(--primary);
      border-radius: 50%;
      opacity: 0;
      animation: pulse 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }

    .pulse-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    .status-text {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(248, 256, 252, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .dots-container {
      display: inline-flex;
      gap: 4px;
    }

    .dot {
      width: 5px;
      height: 5px;
      background-color: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: dot-bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0% { transform: scale(0.6); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Ambient Background Glows */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 230, 118, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .glow-1 { top: -200px; left: -200px; }
    .glow-2 { bottom: -200px; right: -200px; }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="splash-container">
    <div class="logo-container">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <img src="src/assets/Logo.png" alt="PantryPal Pro" class="logo-img">
    </div>
    
    <div class="status-text">
      Preparing your kitchen
      <div class="dots-container">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <script>
    // Fallback redirect in case meta refresh fails
    setTimeout(() => {
      window.location.href = 'src/html/landing.html';
    }, 2500);
  </script>
</body>
</html>
